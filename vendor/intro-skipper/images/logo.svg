<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ultra-smooth multi-stop gradient with micro-transitions -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="20%" stop-color="#323232"/>
      <stop offset="45%" stop-color="#2a2a2a"/>
      <stop offset="70%" stop-color="#222222"/>
      <stop offset="85%" stop-color="#1b1b1b"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Icon group -->
  <g transform="translate(200 225)">
    <!-- Outer circle -->
    <circle r="55" fill="none" stroke="#ffffff" stroke-width="10"/>

    <!-- Centered skip-next symbol -->
    <g>
      <!-- Play triangle (optical centering) -->
      <polygon points="-16,-20 14,0 -16,20" fill="#ffffff"/>

      <!-- Vertical bar -->
      <rect x="20" y="-20" width="12" height="40" rx="3" fill="#ffffff"/>
    </g>
  </g>

  <!-- Text -->
  <text x="275" y="235"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="54"
        fill="#ffffff"
        letter-spacing="0.5px">
    Intro Skipper
  </text>
</svg>
